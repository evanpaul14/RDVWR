<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="RDVWR">
<title>RDVWR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-inner">
    <button class="logo" id="logo-btn" aria-label="Go home">RDVWR</button>
    <div class="search-container">
      <div class="search-wrap">
        <span class="search-prefix" aria-hidden="true">r /</span>
        <input id="subreddit-input" type="text" placeholder="subreddit" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Subreddit name" aria-autocomplete="list" aria-expanded="false" aria-controls="autocomplete-dropdown">
        <button id="search-btn" title="Load subreddit" aria-label="Search">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 10L14 14M11 6A5 5 0 1 1 1 6a5 5 0 0 1 10 0Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="autocomplete-dropdown" id="autocomplete-dropdown" role="listbox"></div>
    </div>
    <a class="main-open" id="main-open" href="#" target="_blank" rel="noopener">↗ reddit</a>
    <button class="settings-btn" id="settings-btn" title="Home feed settings" aria-label="Home feed settings">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="sort-bar" id="sort-bar" style="display:none">
    <button class="sort-btn" data-sort="hot">Hot</button>
    <button class="sort-btn" data-sort="new">New</button>
    <button class="sort-btn active" data-sort="top">Top</button>
    <button class="sort-btn" data-sort="rising">Rising</button>
  </div>
</header>

<main>
<!-- ── Context info (sub or user) ── -->
<div class="ctx-info" id="ctx-info">
  <div id="ctx-icon-wrap"></div>
  <div class="ctx-meta">
    <div class="ctx-title" id="ctx-title"></div>
    <div class="ctx-stats" id="ctx-stats"></div>
  </div>
</div>

<!-- ── Sidebar panel ── -->
<div class="sidebar-panel" id="sidebar-panel">
  <div class="sidebar-inner" id="sidebar-inner"></div>
</div>

<!-- ── Search type bar (posts / communities / users) ── -->
<div class="search-type-bar" id="search-type-bar" style="display:none">
  <button class="search-type-btn active" data-stype="posts">Posts</button>
  <button class="search-type-btn" data-stype="communities">Communities</button>
  <button class="search-type-btn" data-stype="users">Users</button>
</div>

<!-- ── Feed ── -->
<div id="feed">
  <div class="state">
    <div class="state-icon">⌗</div>
    <div class="state-title">Loading…</div>
  </div>
</div>
<div id="scroll-sentinel"></div>
</main>

<!-- ── Full-screen Post View ── -->
<div class="post-view" id="post-view" role="dialog" aria-modal="true" aria-label="Post">
  <div class="pv-bar">
    <div class="pv-bar-left">
      <button class="pv-home" id="pv-home">home</button>
      <div class="pv-breadcrumb" id="pv-breadcrumb" style="display:none"></div>
    </div>
    <div class="search-container pv-search-container">
      <div class="search-wrap pv-search-wrap">
        <span class="search-prefix">r /</span>
        <input id="pv-subreddit-input" type="text" placeholder="subreddit" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Subreddit name" aria-autocomplete="list" aria-expanded="false" aria-controls="pv-autocomplete-dropdown">
        <button id="pv-search-btn" title="Load subreddit" aria-label="Search">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 10L14 14M11 6A5 5 0 1 1 1 6a5 5 0 0 1 10 0Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="autocomplete-dropdown" id="pv-autocomplete-dropdown" role="listbox"></div>
    </div>
    <div class="pv-bar-right">
      <a class="pv-open" id="pv-open" href="#" target="_blank" rel="noopener">↗ reddit</a>
    </div>
  </div>
  <div class="pv-scroll" id="pv-scroll">
    <div class="pv-wrap" id="pv-content"></div>
  </div>
</div>

<div id="lightbox"><img id="lightbox-img" alt=""></div>

<!-- ── Settings modal ── -->
<div class="settings-backdrop" id="settings-backdrop"></div>
<div class="settings-modal" id="settings-modal" role="dialog" aria-modal="true" aria-label="Home feed settings">
  <div class="settings-header">
    <span class="settings-title">Home feed</span>
    <button class="settings-close" id="settings-close" aria-label="Close">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <p class="settings-hint">Paste your Reddit <code>loid</code> cookie to load your personalized home feed.<br>In Chrome: F12 → Application → Cookies → reddit.com → <code>loid</code></p>
  <label class="settings-label" for="settings-loid">loid</label>
  <input class="settings-input" id="settings-loid" type="text" placeholder="0000000027ex9v8v9b.2.…" autocomplete="off" spellcheck="false">
  <label class="settings-label" for="settings-pc">pc <span class="settings-optional">(optional)</span></label>
  <input class="settings-input" id="settings-pc" type="text" placeholder="bq" autocomplete="off" spellcheck="false">
  <div class="settings-actions">
    <button class="settings-save" id="settings-save">Save</button>
    <button class="settings-cancel" id="settings-cancel">Cancel</button>
  </div>
</div>
<script src="{{ url_for('static', filename='marked.min.js') }}"></script>
<script src="{{ url_for('static', filename='purify.min.js') }}"></script>
<script src="{{ url_for('static', filename='hls.min.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
