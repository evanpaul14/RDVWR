<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="RDVWR">
<title>RDVWR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-inner">
    <button class="logo" id="logo-btn">RDVWR</button>
    <div class="search-container">
      <div class="search-wrap">
        <span class="search-prefix">r /</span>
        <input id="subreddit-input" type="text" placeholder="subreddit" autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="search-btn" title="Load subreddit">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M10 10L14 14M11 6A5 5 0 1 1 1 6a5 5 0 0 1 10 0Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
    </div>
  </div>
  <div class="sort-bar" id="sort-bar" style="display:none">
    <button class="sort-btn" data-sort="hot">Hot</button>
    <button class="sort-btn" data-sort="new">New</button>
    <button class="sort-btn active" data-sort="top">Top</button>
    <button class="sort-btn" data-sort="rising">Rising</button>
  </div>
</div>

<!-- ── Context info (sub or user) ── -->
<div class="ctx-info" id="ctx-info">
  <div id="ctx-icon-wrap"></div>
  <div class="ctx-meta">
    <div class="ctx-title" id="ctx-title"></div>
    <div class="ctx-stats" id="ctx-stats"></div>
  </div>
</div>

<!-- ── Feed ── -->
<div id="feed">
  <div class="state">
    <div class="state-icon">⌗</div>
    <div class="state-title">Loading…</div>
  </div>
</div>
<div class="load-more-wrap"><button id="load-more-btn">Load more</button></div>

<!-- ── Full-screen Post View ── -->
<div class="post-view" id="post-view">
  <div class="pv-bar">
    <div class="pv-bar-left">
      <button class="pv-home" id="pv-home">home</button>
      <div class="pv-breadcrumb" id="pv-breadcrumb" style="display:none"></div>
    </div>
    <div class="search-container pv-search-container">
      <div class="search-wrap pv-search-wrap">
        <span class="search-prefix">r /</span>
        <input id="pv-subreddit-input" type="text" placeholder="subreddit" autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="pv-search-btn" title="Load subreddit">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M10 10L14 14M11 6A5 5 0 1 1 1 6a5 5 0 0 1 10 0Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="autocomplete-dropdown" id="pv-autocomplete-dropdown"></div>
    </div>
    <div class="pv-bar-right">
      <a class="pv-open" id="pv-open" href="#" target="_blank" rel="noopener">↗ reddit</a>
    </div>
  </div>
  <div class="pv-scroll" id="pv-scroll">
    <div class="pv-wrap" id="pv-content"></div>
  </div>
</div>

<div id="lightbox"><img id="lightbox-img" alt=""></div>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
