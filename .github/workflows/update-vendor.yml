name: Update vendor JS

on:
  schedule:
    - cron: '0 3 * * 1'  # every Monday at 3am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install requests

      - run: python3 update_vendor.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/marked.min.js static/purify.min.js static/hls.min.js
          git diff --cached --quiet || git commit -m "Update vendor JS libraries"
          git push
